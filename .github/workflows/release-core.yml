name: "Release: Core (npm)"

on:
  push:
    tags: ["v*"]
  # Manual re-publish after a workflow fix / transient infra failure, without
  # recreating the release tag.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships npm 11.5+, the minimum for OIDC Trusted Publishing's
      # registry-side handshake (Node 22's bundled npm 10.9 cannot complete it).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Presets in sync
        run: npm run check:presets

      - name: Build core
        run: npm run build:core

      - name: Publish to npm (Trusted Publisher, OIDC)
        # Idempotent. The v* tag also drives release-python.yml, so a re-run
        # (e.g. after a transient PyPI failure) must not hard-fail here — and the
        # 0.1.0 bootstrap is published manually from the CLI to create the
        # package before an OIDC Trusted Publisher can be configured for it.
        # Publish only when this exact version is not already on the registry.
        run: |
          VERSION=$(node -p "require('./core/package.json').version")
          PUBLISHED=$(npm view "@molcrafts/molplot@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "@molcrafts/molplot@${VERSION} already published — skipping."
          else
            npm publish -w core --provenance --access public
          fi
